version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: simplifica-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simplifica}
      POSTGRES_USER: ${POSTGRES_USER:-simplifica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simplifica}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simplifica-network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: simplifica-backend
    ports:
      - "3333:3333"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-3.5-sonnet}
      DOE_API_URL: ${DOE_API_URL:-https://diariooficial.to.gov.br/api.json}
      DOE_SYNC_CRON: ${DOE_SYNC_CRON:-0 8 * * 1-5}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3333}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
    networks:
      - simplifica-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: simplifica-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
    depends_on:
      - backend
    networks:
      - simplifica-network

volumes:
  postgres_data:

networks:
  simplifica-network:
    driver: bridge
